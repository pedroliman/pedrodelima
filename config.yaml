  # About
  about:
    enable: true
    title: "About Me"
    #image: "/images/pedro.jpg"
    content: |-
      
      I am an Associate [Engineer](https://www.rand.org/about/people/l/lima_pedro_nascimento_de.html) at [RAND](https://www.rand.org), a research organization dedicated to improving policy and decisionmaking through research and analysis.
      
      My [research](#achievements) uses simulation models and (high-performance) computing to inform public policy when decision-makers face difficult dillemas and there is no clear best-choice due to uncertainty or conflicting societal objectives. I have a background in engineering and a PhD in Policy Analysis, with analytical concentrations in Quantitative and Economic Analysis, and specialization in Health Policy.
      
      My recent research investigated [COVID-19](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0259166) control strategies and informs the design of pandemic response plans. I also work on other health policy areas, such as [cancer early detection](https://doi.org/10.1158/1055-9965.EPI-21-1001).
      
      I am generally intereted in working at the intersection of modeling, decision-making under uncertainty and policy analysis.
      
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "HTML"
        - "CSS"
        - "JavaScript"
        - "React"
        - "Node"
        - "Express"

