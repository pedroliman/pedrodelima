  # About
  about:
    enable: true
    title: "About Me"
    #image: "/images/pedro.jpg"
    content: |-
      
      I am an Associate [Engineer](https://www.rand.org/about/people/l/lima_pedro_nascimento_de.html) at [RAND](https://www.rand.org), a research organization dedicated to improving policy and decision-making through research and analysis.
      
      My [research](#achievements) uses simulation models and (high-performance) computing to inform public policy when decision-makers face complex dilemmas and there is no obvious policy choice due to uncertainty or conflicting societal objectives. I have a background in engineering and a Ph.D. in Policy Analysis.
      
      I self-identify as an *eclectic modeler* - someone who has been trained on, appreciates, and uses a wide variety of modeling paradigms. Whether you self-identify as an econometrician, biostatistician, systems dynamicist, or complex systems modeler, we have a lot to chat about. I believe that all models are wrong, but all models can be useful if used by competent and honest researchers.
      
      My recent research investigates [COVID-19](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0259166) control strategies and informs the design of pandemic response plans. I also work on other health policy areas, such as [cancer early detection](https://doi.org/10.1158/1055-9965.EPI-21-1001).
      
      More generally, I am interested in using computational models to shed light on tradeoffs imposed by policy problems. A recent example of this involves using many-objective optimization to investigate the effects of policies to reduce [racial wealth disparities](https://www.rand.org/pubs/research_reports/RRA1259-2.html). 
      
      If you're interested in my work and want to connect, follow me on [Twitter](https://twitter.com/PedroNdeLima) and connect on [LinkedIn](https://www.linkedin.com/in/pedro-nascimento-de-lima/)!
      
    skills:
      enable: false
      title: "Here are a few technologies I've been working with recently:"
      items:
